spring.application.name=smart-attendance-backend

# Server Configuration
server.port=${PORT:8080}

# MySQL Database Configuration (Aiven SQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_db?createDatabaseIfNotExist=true&useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Python Service URL (Flask API)
python.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}

# JWT Configuration
jwt.secret=${JWT_SECRET:myVeryLongAndSecureSecretKeyForJwtTokenGeneration2026SmartAttendance}
jwt.expiration-ms=900000

# Logging
logging.level.com.school.smart_attendance_backend=INFO
logging.level.org.springframework.web=INFO
